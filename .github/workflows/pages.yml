name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble static site
        run: |
          set -euo pipefail
          mkdir -p _site

          # The docs site lives in docs/. Make it the deploy root.
          cp -R docs/.            _site/

          # Sibling folders the docs HTML references via ../tokens/, ../base/,
          # ../components/, ../utils/, ../themes/, ../blocks/, ../create/.
          cp -R tokens            _site/tokens
          cp -R base              _site/base
          cp -R components        _site/components
          cp -R utils             _site/utils
          cp -R themes            _site/themes
          cp -R blocks            _site/blocks
          cp -R create            _site/create
          cp    index.css         _site/index.css

          # The docs index expects to be the entry point.
          ls _site/index.html >/dev/null

          # Avoid GitHub trying to run Jekyll on raw files (CSS/JS).
          touch _site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
